spring.application.name=ecommerce

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:ecommercedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console (accessible at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Load seed data after Hibernate has created the schema
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

server.port=8090

# OpenAPI / Swagger UI  →  http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# JWT
jwt.secret=${JWT_SECRET:change-me-to-a-long-random-secret-of-at-least-32-chars}
jwt.expiry-seconds=${JWT_EXPIRY_SECONDS:86400}

# Apple App Store (iOS)
apple.bundle-id=${APPLE_BUNDLE_ID:com.example.ecommerce}
apple.key-id=${APPLE_KEY_ID:}
apple.issuer-id=${APPLE_ISSUER_ID:}
apple.private-key-path=${APPLE_PRIVATE_KEY_PATH:}
apple.environment=${APPLE_ENVIRONMENT:SANDBOX}
